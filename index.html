<!-- Main JS -->
<script src="js/script.js"></script>
<script>
  (function () {
    if (typeof window.$ !== 'function') return;

    var API_BASE = '';
    var LEGACY_IMAGE_ORIGIN = (window.location.hostname.indexOf('vercel.app') !== -1) ? 'https://banlabacsicuachinhminh.koyeb.app' : '';

    function normalizeImg(src, fallback) {
      if (!src) return fallback;
      if (src.startsWith('http://') || src.startsWith('https://')) return src;
      if (src.startsWith('/')) return LEGACY_IMAGE_ORIGIN + src;
      return 'images/blog/' + src;
    }

    $(function () {
      var currentPage = 1;
      var totalPages = 1;

      function renderArticlesPage(page) {
        $.get(API_BASE + '/api/posts', { page: page, limit: 7 }, function (res) {
          var posts = Array.isArray(res) ? res : (res.items || []);
          if (!posts.length) return;

          currentPage = res.page || page || 1;
          totalPages = res.pages || 1;

          // Featured (bài mới nhất) lấy từ bài đầu tiên của trang 1
          if (currentPage === 1) {
            var newest = posts[0];
            if (newest) {
              var $feat = $('.featured-post');
              if ($feat.length) {
                var featLink = 'single-blog.html?id=' + encodeURIComponent(newest._id);
                var featImgSrc = normalizeImg(newest.img_introduce, 'images/featured-post.jpg');

                $feat.find('.featured-post-title')
                  .attr('href', featLink)
                  .text(newest.title || '');

                var $authorSpan = $feat.find('.featured-post-author span');
                if ($authorSpan.length) {
                  $authorSpan.text(newest.audthor || '');
                }

                var $metaLi = $feat.find('.featured-post-meta li');
                if ($metaLi.length) {
                  $metaLi.contents().filter(function () {
                    return this.nodeType === 3;
                  }).remove();
                  $metaLi.append(' ' + (newest.datetime || ''));
                }

                var $featImg = $feat.find('.featured-post-thumb img');
                if ($featImg.length) {
                  $featImg.attr('src', featImgSrc);
                }
              }
            }
          }

          // Articles list (7 bài / trang)
          var $container = $('#dynamic-posts');
          if (!$container.length) return;

          $container.empty();

          posts.forEach(function (post) {
            var imgSrc = normalizeImg(post.img_introduce, 'images/blog/blog-thum-1.png');
            if (post.updatedAt) {
              imgSrc += '?v=' + encodeURIComponent(post.updatedAt);
            }
            var link = 'single-blog.html?id=' + encodeURIComponent(post._id);

            var html =
              '<article class="blog-post">' +
                '<div class="blog-post-thumb">' +
                  '<a href="' + link + '">' +
                    '<img src="' + imgSrc + '" alt="blog-thum" />' +
                  '</a>' +
                '</div>' +
                '<div class="blog-post-content">' +
                  '<div class="blog-post-tag">' +
                    '<a href="category.html">Health</a>' +
                  '</div>' +
                  '<div class="blog-post-title">' +
                    '<a href="' + link + '">' + (post.title || '') + '</a>' +
                  '</div>' +
                  '<div class="blog-post-meta">' +
                    '<ul>' +
                      '<li>By <a href="about.html">' + (post.audthor || '') + '</a></li>' +
                      '<li><i class="fa fa-clock-o"></i> ' + (post.datetime || '') + '</li>' +
                    '</ul>' +
                  '</div>' +
                  '<p>' + (post.content_introduce || '') + '</p>' +
                  '<a href="' + link + '" class="blog-post-action">read more <i class="fa fa-angle-right"></i></a>' +
                '</div>' +
              '</article>';

            $container.append(html);
          });

          // render pagination
          var $pagination = $('.blog-post-pagination .pagination');
          if (!$pagination.length) return;

          $pagination.empty();

          for (var i = 1; i <= totalPages; i++) {
            var activeClass = i === currentPage ? ' active' : '';
            var itemHtml =
              '<li class="page-item' + activeClass + '">' +
                '<a class="page-link" href="#" data-page="' + i + '">' + i + '</a>' +
              '</li>';
            $pagination.append(itemHtml);
          }
        });
      }

      // initial load
      renderArticlesPage(1);

      // handle pagination click
      $(document).on('click', '.blog-post-pagination .page-link', function (e) {
        e.preventDefault();
        var page = parseInt($(this).data('page'), 10);
        if (!page || page === currentPage) return;
        renderArticlesPage(page);
      });
      // trending posts (top 4 theo count)
      $.get(API_BASE + '/api/posts/trending', function (posts) {
        if (!Array.isArray(posts) || !posts.length) return;

        var $wrap = $('#trending-posts');
        if (!$wrap.length) return;

        $wrap.empty();

        posts.forEach(function (post) {
          var imgSrc = normalizeImg(post.img_introduce, 'images/blog/blog-thum-8.png');
          if (post.updatedAt) {
            imgSrc += '?v=' + encodeURIComponent(post.updatedAt);
          }
          var link = 'single-blog.html?id=' + encodeURIComponent(post._id);

          var html =
            '<div class="latest-widget">' +
              '<div class="latest-widget-thum">' +
                '<a href="' + link + '">' +
                  '<img src="' + imgSrc + '" alt="blog-thum" />' +
                '</a>' +
                '<div class="icon">' +
                  '<a href="' + link + '">' +
                    '<img src="images/blog/icon.svg" alt="icon" />' +
                  '</a>' +
                '</div>' +
              '</div>' +
              '<div class="latest-widget-content">' +
                '<div class="content-title">' +
                  '<a href="' + link + '">' + (post.title || '') + '</a>' +
                '</div>' +
                '<div class="content-meta">' +
                  '<ul>' +
                    '<li><i class="fa fa-clock-o"></i> ' + (post.datetime || '') + '</li>' +
                  '</ul>' +
                '</div>' +
              '</div>' +
            '</div>';

          $wrap.append(html);
        });
      });
    });
  })();
</script>
