<script>
  (function () {
    if (typeof window.$ !== 'function') return;

    function getQueryParam(name) {
      var urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    var API_BASE = '';
    var LEGACY_IMAGE_ORIGIN = (window.location.hostname.indexOf('vercel.app') !== -1) ? 'https://banlabacsicuachinhminh.koyeb.app' : '';

    function normalizeImg(src, fallback) {
      if (!src) return fallback;
      if (src.startsWith('http://') || src.startsWith('https://')) return src;
      if (src.startsWith('/')) return LEGACY_IMAGE_ORIGIN + src;
      return 'images/blog/' + src;
    }

    $(function () {
      var id = getQueryParam('id');
      if (!id) {
        return;
      }

      $.get(API_BASE + '/api/posts/' + encodeURIComponent(id), function (post) {
        if (!post || !post._id) return;

        var $article = $('.single-blog');
        if (!$article.length) return;

        // title
        $article.find('p.title').text(post.title || '');

        // meta
        var $metaItems = $article.find('ul.meta li');
        if ($metaItems.length >= 1) {
          var $authorLink = $metaItems.eq(0).find('a');
          if ($authorLink.length) {
            $authorLink.text(post.audthor || '');
          }
        }
        if ($metaItems.length >= 2) {
          $metaItems.eq(1).contents().filter(function () {
            return this.nodeType === 3;
          }).remove();
          $metaItems.eq(1).append(' ' + (post.datetime || ''));
        }

        // main image
        var mainImgSrc = normalizeImg(post.img_introduce, 'images/blog/blog-single.png');
        if (post.updatedAt) {
          mainImgSrc += '?v=' + encodeURIComponent(post.updatedAt);
        }
        $article.find('> img').attr('src', mainImgSrc);

        // intro content: đoạn văn ngay sau ảnh chính
        var introHtml = (post.content_introduce || '').replace(/\n/g, '<br>');
        var $introP = $article.find('img').first().nextAll('p').first();
        if ($introP.length) {
          $introP.html(introHtml);
        }

        // block 1 title + content + highlight
        var $firstH3 = $article.find('h3').first();
        var $block1P = $firstH3.next('p');
        var $blockquote = $article.find('blockquote');

        if (post.title_block_1) {
          $firstH3.text(post.title_block_1);
        }
        if (post.content_block_1 && $block1P.length) {
          $block1P.html(post.content_block_1.replace(/\n/g, '<br>'));
        }
        if (post.hightlight_block_1 && $blockquote.length) {
          $blockquote.find('p').text(post.hightlight_block_1);
        }

        // ẩn blockquote nếu không có highlight
        if (!post.hightlight_block_1 && $blockquote.length) {
          $blockquote.hide();
        }

        // nếu không có cả title_block_1 và hightlight_block_1 thì ẩn cả tiêu đề + highlight, vẫn cho phép hiển thị nội dung nếu có
        if (!post.title_block_1 && !post.hightlight_block_1) {
          if ($firstH3.length) $firstH3.hide();
        }

        // ẩn đoạn lorem mẫu ngay sau blockquote (không dùng DB)
        $article.find('blockquote').next('p').hide();

        // images block 1

        var $bannerImgs = $article.find('.single-blog-banner img');
        var $bannerBlocks = $article.find('.single-blog-banner .banner');
        var hasImg1 = !!post.img_block_1_1;
        var hasImg2 = !!post.img_block_1_2;

        if (hasImg1 && $bannerImgs.length >= 1) {
          var img1 = normalizeImg(post.img_block_1_1, $bannerImgs.eq(0).attr('src'));
          if (post.updatedAt) {
            img1 += '?v=' + encodeURIComponent(post.updatedAt);
          }
          $bannerImgs.eq(0).attr('src', img1);
        }
        if (hasImg2 && $bannerImgs.length >= 2) {
          var img2 = normalizeImg(post.img_block_1_2, $bannerImgs.eq(1).attr('src'));
          if (post.updatedAt) {
            img2 += '?v=' + encodeURIComponent(post.updatedAt);
          }
          $bannerImgs.eq(1).attr('src', img2);
        }

        // nếu chỉ có 1 ảnh, ẩn block còn lại để layout không bị lỗi
        if (hasImg1 && !hasImg2 && $bannerBlocks.length >= 2) {
          $bannerBlocks.eq(1).hide();
        }
        if (!hasImg1 && hasImg2 && $bannerBlocks.length >= 1) {
          $bannerBlocks.eq(0).hide();
        }

        // nếu không có cả 2 ảnh thì ẩn luôn banner block 1
        if (!hasImg1 && !hasImg2) {
          $article.find('.single-blog-banner').hide();
        }

        // block 2 title + content (nếu không có thì ẩn)
        var $h3s = $article.find('h3');
        if ($h3s.length > 1) {
          var $h3_2 = $h3s.eq(1);
          var $p2 = $h3_2.next('p');

          if (post.title_block_2 || post.content_block_2) {
            if (post.title_block_2) {
              $h3_2.text(post.title_block_2);
            }
            if (post.content_block_2 && $p2.length) {
              $p2.html(post.content_block_2.replace(/\n/g, '<br>'));
            }
          } else {
            $h3_2.hide();
            if ($p2.length) $p2.hide();
          }
        }

        // block 3, 4, 5: title + content giống logic block 2
        var extraBlocks = [
          { title: post.title_block_3, content: post.content_block_3 },
          { title: post.title_block_4, content: post.content_block_4 },
          { title: post.title_block_5, content: post.content_block_5 }
        ];

        extraBlocks.forEach(function (b) {
          if (!b.title && !b.content) return;

          var $h3 = $('<h3></h3>');
          var $p = $('<p></p>');

          if (b.title) {
            $h3.text(b.title);
          }
          if (b.content) {
            $p.html(b.content.replace(/\n/g, '<br>'));
          }

          $article.append($h3);
          $article.append($p);
        });

        // prev / next navigation
        var $nav = $('.blog-single-presentation');
        if ($nav.length) {
          var $items = $nav.find('li');
          // prev
          if (post.prev && $items.length) {
            var $prevLi = $items.eq(0);
            var prevLink = 'single-blog.html?id=' + encodeURIComponent(post.prev._id);
            $prevLi.find('.title')
              .attr('href', prevLink)
              .text(post.prev.title || '');
            $prevLi.find('i.fa-clock-o').nextAll().remove();
            $prevLi.find('i.fa-clock-o').after(' ' + (post.prev.datetime || ''));
          } else if ($items.length) {
            $items.eq(0).hide();
          }

          // next
          if (post.next && $items.length > 1) {
            var $nextLi = $items.eq(1);
            var nextLink = 'single-blog.html?id=' + encodeURIComponent(post.next._id);
            $nextLi.find('.title')
              .attr('href', nextLink)
              .text(post.next.title || '');
            $nextLi.find('i.fa-clock-o').nextAll().remove();
            $nextLi.find('i.fa-clock-o').after(' ' + (post.next.datetime || ''));
          } else if ($items.length > 1) {
            $items.eq(1).hide();
          }

          if ((!post.prev && !post.next)) {
            $nav.hide();
          }
        }
      });
    });
  })();
</script>
